name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          version="${GITHUB_REF_NAME}"
          mkdir -p dist
          binary="berrypick${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w -X main.version=${version}" -o "dist/${binary}" .

      - name: Package
        run: |
          cd dist
          base="berrypick_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${base}.zip" "berrypick${{ matrix.ext }}"
            rm "berrypick${{ matrix.ext }}"
          else
            tar -czf "${base}.tar.gz" berrypick
            rm berrypick
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: berrypick_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/*

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
